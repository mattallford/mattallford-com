name: Deprovision Ephemeral Environment

on:
  pull_request:
    types:
      - closed

jobs:
  deprovision:
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - name: Login to Octopus Deploy
        uses: OctopusDeploy/login@v1
        with:
          server: https://mattallford.octopus.app
          service_account_id: 070b764c-e9af-41ca-8703-7aea43b15af5

      - name: 🐙 Deprovision Ephemeral Environment Action
        uses: OctopusDeploy/deprovision-ephemeral-environment@v1.0.1
        with:
          name: pr${{ github.event.pull_request.number }}
          space: Default
          all_projects: true